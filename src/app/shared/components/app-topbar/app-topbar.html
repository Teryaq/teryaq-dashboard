<header class="app-topbar">
  <div class="app-topbar__container">
    <!-- Left: sidebar toggle -->
    <p-button
      [icon]="collapseIcon()"
      [text]="true"
      severity="secondary"
      class="app-topbar__toggle app-topbar__toggle--desktop"
      [attr.aria-label]="sidebarState.collapsed() ? ('nav.expand' | translate) : ('nav.collapse' | translate)"
      (onClick)="sidebarState.toggleCollapsed()"
    />

    <p-button
      icon="pi pi-bars"
      [text]="true"
      severity="secondary"
      class="app-topbar__toggle app-topbar__toggle--mobile"
      [attr.aria-label]="'nav.menu' | translate"
      (onClick)="sidebarState.openMobile()"
    />

    <!-- Center: context pills -->
    <div class="app-topbar__context">
      <span class="app-topbar__pill app-topbar__pill--pharmacy">
        <i class="pi pi-building" aria-hidden="true"></i>
        {{ 'topbar.pharmacy' | translate }}
      </span>
      <span class="app-topbar__pill app-topbar__pill--branch">
        <i class="pi pi-map-marker" aria-hidden="true"></i>
        {{ 'topbar.mainBranch' | translate }}
      </span>
      <span class="app-topbar__pill app-topbar__pill--live">
        <span class="app-topbar__live-dot" aria-hidden="true"></span>
        {{ 'topbar.liveApi' | translate }}
      </span>
      <span class="app-topbar__date">
        <i class="pi pi-calendar" aria-hidden="true"></i>
        {{ todayDate() }}
      </span>
    </div>

    <!-- Right: actions -->
    <div class="app-topbar__actions">
      @if (userRole(); as roleKey) {
        <span class="app-topbar__role-badge">
          <i class="pi pi-user" aria-hidden="true"></i>
          {{ roleKey | translate }}
        </span>
      }

      <div class="app-topbar__toggle-group">
        <span class="app-topbar__toggle-label" aria-hidden="true">
          <i class="pi" [class.pi-sun]="!themeService.isDark()" [class.pi-moon]="themeService.isDark()"></i>
        </span>
        <p-toggleSwitch
          [ngModel]="themeService.isDark()"
          (ngModelChange)="setDarkMode($event)"
          [ariaLabel]="themeService.isDark() ? ('nav.themeDark' | translate) : ('nav.themeLight' | translate)"
        />
      </div>

      <p-button
        [label]="i18n.locale() === 'en' ? 'AR' : 'EN'"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (onClick)="toggleLocale()"
        [attr.aria-label]="'nav.language' | translate"
      />
    </div>
  </div>
</header>
