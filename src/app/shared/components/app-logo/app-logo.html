<a class="logo" routerLink="/" [class.logo--compact]="compact()" [class.logo--full]="full()">

  @if (full()) {
    <!-- Full PNG — used on white login/register cards -->
    <img
      src="assets/images/logo.png"
      alt="Teryaq – Pharmacy Management System"
      class="logo__full-img"
    />

  } @else if (compact()) {
    <!-- Collapsed sidebar: crop to icon area only -->
    <div class="logo__icon-crop" aria-label="Teryaq"></div>

  } @else {
    <!-- Sidebar expanded: cropped icon + written brand text -->
    <div class="logo__icon-crop logo__icon-crop--sm" aria-hidden="true"></div>
    <div class="logo__brand">
      <span class="logo__name">Teryaq</span>
      <span class="logo__arabic">— ترياق —</span>
    </div>
  }

</a>
